<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Control | PMF | Center of Excellence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --rc-forest:#0B3D2E;
    --rc-forest-deep:#082A20;
    --rc-emerald:#17694A;
    --rc-gold:#C89B3C;
    --rc-gold-soft:#E7CD8F;
    --page-bg:#EEF1F0;
    --panel-white:#FFFFFF;
    --rc-ink:#172018;
    --rc-line: rgba(11,61,46,0.12);
    --shadow: 0 16px 40px -18px rgba(11,61,46,0.28);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--page-bg);
    color:var(--rc-ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    letter-spacing:-0.01em;
    color:var(--rc-forest-deep);
    margin:0;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--rc-emerald);
    font-weight:500;
  }
  a{color:inherit;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1160px;margin:0 auto;padding:0 28px;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  /* ---------- Side banner (Renaissance leaf) ---------- */
  .side-banner{
    position:fixed;
    top:0; left:0;
    width:64px; height:100vh;
    z-index:5;
    overflow:hidden;
    background:var(--panel-white);
    box-shadow:2px 0 12px -6px rgba(11,61,46,0.18);
  }
  .side-banner img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:left center;
  }
  body{padding-left:64px;}
  @media (max-width:900px){
    .side-banner{display:none;}
    body{padding-left:0;}
  }

  /* ---------- Section backgrounds using the side banner image ---------- */
  .side-bg{
    background-image: url('./image.png');
    background-repeat: no-repeat;
    background-position: left center;
    background-size: 64px 100%; /* match the fixed banner width and stretch vertically */
    /* keep original section background color visible to the right */
  }
  @media (max-width:900px){
    .side-bg{background-image:none;} /* remove on small screens */
  }

  /* ---------- Header ---------- */
  header{
    position:sticky; top:0; z-index:50;
    background:var(--panel-white);
    border-bottom:1px solid var(--rc-line);
  }
  .header-inner{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px;
    max-width:1160px; margin:0 auto;
  }
  .brand-logo{
    display:flex; align-items:center; gap:14px;
  }
  .brand-logo img{
    height:76px; width:auto;
  }
  .brand-logo .fallback-word{
    font-family:'Fraunces', serif; font-weight:600; font-size:1.15rem;
    color:var(--rc-forest-deep); display:none;
  }
  .coe-tag{
    border-left:1px solid var(--rc-line);
    padding-left:14px; margin-left:2px;
  }
  .coe-tag .line1{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.64rem; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--rc-emerald);
  }
  .coe-tag .line2{
    font-family:'Fraunces', serif; font-size:1.02rem; color:var(--rc-forest-deep); font-weight:500;
  }
  nav{display:flex; align-items:center; gap:26px;}
  nav a{
    color:#3f4a43;
    text-decoration:none;
    font-size:0.9rem;
    font-weight:500;
    transition:color .2s ease;
  }
  nav a:hover, nav a:focus-visible{color:var(--rc-emerald);}
  nav a.btn-leadership{
    background:var(--rc-forest-deep);
    color:var(--panel-white) !important;
    padding:9px 18px;
    border-radius:20px;
    font-weight:600;
    font-size:0.86rem;
  }
  nav a.btn-leadership:hover{background:var(--rc-emerald);}
  .nav-toggle{display:none; background:none; border:0; color:var(--rc-forest-deep); font-size:1.4rem; cursor:pointer;}

  @media (max-width:760px){
    nav{
      position:absolute; top:100%; left:0; right:0;
      background:var(--panel-white);
      flex-direction:column; align-items:flex-start; padding:8px 28px 20px;
      display:none;
      gap:16px;
      border-bottom:1px solid var(--rc-line);
    }
    nav.open{display:flex;}
    .nav-toggle{display:block;}
  }

  /* ---------- Hero (split, AssuriCore-style) ---------- */
  .hero{
    background:var(--page-bg);
    padding:64px 0 80px;
    background-color: #f4f1ea;
  }
  .hero-grid{
    display:grid; grid-template-columns:1.05fr 0.95fr; gap:40px; align-items:center;
  }
  @media (max-width:900px){.hero-grid{grid-template-columns:1fr;}}

  .hero h1{
    font-size:clamp(2rem, 4vw, 2.9rem);
    line-height:1.12;
    margin:16px 0 20px;
  }
  .hero p.lede{
    max-width:50ch;
    font-size:1.04rem;
    line-height:1.65;
    color:#48534c;
    margin-bottom:30px;
  }
  .hero-ctas{display:flex; gap:14px; flex-wrap:wrap;}
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:13px 24px;
    border-radius:4px;
    font-weight:600; font-size:0.9rem;
    text-decoration:none; cursor:pointer; border:1px solid transparent;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
  }
  .btn-primary{background:var(--rc-forest-deep); color:var(--panel-white);}
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 12px 26px -10px rgba(11,61,46,0.4);}
  .btn-gold{background:var(--rc-gold); color:var(--rc-forest-deep);}
  .btn-gold:hover{transform:translateY(-2px); box-shadow:0 12px 26px -10px rgba(200,155,60,0.5);}
  .btn-outline{border-color:var(--rc-line); color:var(--rc-forest-deep); background:var(--panel-white);}
  .btn-outline:hover{border-color:var(--rc-emerald); color:var(--rc-emerald);}

  .hero-art{
    position:relative;
    border-radius:8px;
    overflow:hidden;
    box-shadow:var(--shadow);
    aspect-ratio:6/5;
  }
  .hero-art svg{width:100%; height:100%; display:block;}

  /* ---------- Section shells ---------- */
  section{padding:88px 0;}
  .section-head{max-width:640px; margin-bottom:52px;}
  .section-head h2{font-size:clamp(1.6rem,3vw,2.2rem); margin:12px 0 14px;}
  .section-head p{color:#48534c; line-height:1.6; font-size:1rem;}

  /* ---------- Divisions ---------- */
  .divisions{background:var(--page-bg);}
  .division-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:24px;
  }
  @media (max-width:900px){.division-grid{grid-template-columns:1fr;}}

  .division-card{
    position:relative;
    background:var(--panel-white);
    border:1px solid var(--rc-line);
    border-radius:6px;
    padding:32px 24px 28px;
    overflow:hidden;
    box-shadow:var(--shadow);
    transition:transform .22s ease;
  }
  .division-card:hover{transform:translateY(-4px);}
  .division-card::before{
    content:"";
    position:absolute; top:0; left:0; width:6px; height:100%;
    background:linear-gradient(to bottom, var(--rc-gold), var(--rc-emerald));
  }
  .division-card .code{
    font-family:'IBM Plex Mono', monospace;
    font-size:2.3rem; font-weight:500;
    color:var(--rc-forest);
    opacity:0.12;
    line-height:1;
    margin-bottom:10px;
  }
  .division-card h3{font-size:1.24rem; margin-bottom:10px;}
  .division-card p{color:#4a554e; font-size:0.94rem; line-height:1.6; margin-bottom:16px;}
  .division-card .tag{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--rc-emerald);
    border:1px solid rgba(23,105,74,0.3);
    padding:4px 10px; border-radius:20px;
  }

  /* ---------- PMF Spotlight ---------- */
  .rainbow-bar{
    width:64px; height:4px; border-radius:2px; margin:14px 0 0;
    background:linear-gradient(90deg, #E4572E, #F2A93B, #F4D35E, #8BC34A, #3F8F5C);
  }
  .pmf-spotlight{background:var(--panel-white); padding-top:0; padding-bottom:88px; position:relative;}

  /* Fixed full-viewport background photo + readability overlay.
     These sit behind everything (z-index:0). Opacity is user-adjustable
     via the slider control; the overlay + hero-card contrast is fixed
     independently so text always stays readable regardless of the photo setting. */
  .bg-photo{
    position:fixed; inset:0; z-index:0;
    background-image:url('./image4.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    opacity:0.55;
    transition:opacity .2s ease;
  }
  .bg-photo-overlay{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:linear-gradient(180deg, rgba(8,42,32,0.38) 0%, rgba(8,42,32,0.12) 42%, var(--page-bg) 94%);
  }

  .photo-hero{
    position:relative; z-index:1;
    min-height:78vh;
    display:flex;
    align-items:center;
    padding:0 5vw;
    margin-bottom:64px;
  }
  @media (max-width:900px){.photo-hero{min-height:60vh; padding:0 24px;}}

  .hero-card{
    position:relative; z-index:2;
    max-width:480px;
    background:rgba(8,42,32,0.76);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-radius:10px;
    padding:38px 34px;
    box-shadow:var(--shadow);
    color:var(--panel-white);
  }
  .hero-card .eyebrow{color:var(--rc-gold-soft);}
  .hero-card h3{font-size:clamp(1.5rem,3vw,1.9rem); margin:12px 0 14px; color:var(--panel-white);}
  .hero-card p{font-size:0.98rem; line-height:1.6; color:rgba(255,255,255,0.9); margin-bottom:20px;}
  .hero-card a.btn{background:var(--rc-gold); color:var(--rc-forest-deep); align-self:flex-start;}
  .hero-card a.btn:hover{background:var(--rc-gold-soft);}

  .pmf-tabs{
    display:flex; flex-wrap:wrap; gap:10px;
    margin-top:26px;
  }
  .pmf-tabs a{
    font-size:0.82rem; font-weight:600;
    padding:8px 16px; border-radius:20px;
    background:rgba(255,255,255,0.16);
    color:var(--panel-white);
    text-decoration:none;
    border:1px solid rgba(255,255,255,0.35);
    transition:background .18s ease;
  }
  .pmf-tabs a:hover{background:rgba(255,255,255,0.3);}

  /* Opacity control widget */
  .bg-toggle{
    position:fixed; right:20px; bottom:20px; z-index:60;
    background:var(--panel-white);
    border:1px solid var(--rc-line);
    border-radius:8px;
    padding:12px 16px;
    box-shadow:var(--shadow);
    display:flex; align-items:center; gap:10px;
    font-size:0.78rem; color:var(--rc-forest-deep);
  }
  .bg-toggle label{font-weight:600; white-space:nowrap;}
  .bg-toggle input[type="range"]{width:110px; accent-color:var(--rc-emerald);}
  .bg-toggle span{font-family:'IBM Plex Mono', monospace; font-size:0.72rem; width:34px;}
  @media (max-width:600px){
    .bg-toggle{left:12px; right:12px; bottom:12px; justify-content:space-between;}
    .bg-toggle input[type="range"]{width:auto; flex:1;}
  }

  .pmf-sub{margin-top:64px;}
  .pmf-sub-head{margin-bottom:32px;}
  .pmf-sub-head h3{font-size:1.4rem; margin:10px 0 10px;}
  .pmf-sub-head p{color:#48534c; font-size:0.95rem; line-height:1.6; max-width:60ch;}

  /* Library flow */
  .library-grid{
    display:grid; grid-template-columns:0.8fr 1fr 1.1fr; gap:32px; align-items:center;
  }
  @media (max-width:900px){.library-grid{grid-template-columns:1fr;}}

  .library-flow{display:flex; flex-direction:column; gap:10px;}
  .library-flow .flow-step{
    background:var(--rc-gold-soft);
    color:var(--rc-forest-deep);
    font-weight:600; font-size:0.9rem;
    text-align:center;
    padding:12px 14px; border-radius:4px;
  }
  .library-flow .flow-step.primary{background:var(--rc-gold);}
  .library-flow .flow-arrow{
    align-self:center; color:var(--rc-forest); opacity:0.5; font-size:1.1rem;
  }

  .library-doc-card{
    background:var(--rc-gold);
    border-radius:6px;
    overflow:hidden;
    box-shadow:var(--shadow);
    aspect-ratio:3/4;
    display:flex; flex-direction:column;
  }
  .library-doc-card .doc-art{flex:1; position:relative;}
  .library-doc-card .doc-art svg{width:100%; height:100%; display:block;}
  .library-doc-card .doc-label{
    background:var(--panel-white);
    padding:16px 18px 18px;
  }
  .library-doc-card .doc-label .doc-eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:0.62rem; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--rc-emerald); margin-bottom:6px;
  }
  .library-doc-card .doc-label h4{
    font-family:'Fraunces', serif; font-size:1.05rem; color:var(--rc-forest-deep); margin-bottom:4px;
  }
  .library-doc-card .doc-label .doc-sub{font-size:0.8rem; color:#5a655e;}

  .toc-list h4{font-size:0.95rem; margin-bottom:14px; color:var(--rc-forest-deep);}
  .toc-list ol{margin:0; padding-left:20px; color:#3f4a43; font-size:0.92rem; line-height:2;}

  /* Control example */
  .control-panel{
    display:grid; grid-template-columns:1fr 1.4fr; gap:0;
    border:1px solid var(--rc-line); border-radius:6px; overflow:hidden;
    box-shadow:var(--shadow);
  }
  @media (max-width:800px){.control-panel{grid-template-columns:1fr;}}

  .control-desc{
    background:var(--page-bg);
    padding:26px 24px;
    display:flex; flex-direction:column; gap:16px;
  }
  .control-desc .desc-row{font-size:0.85rem; color:#3f4a43; line-height:1.5;}
  .control-desc .desc-row strong{display:block; color:var(--rc-forest-deep); font-size:0.8rem; margin-bottom:3px;}

  .control-detail{background:var(--panel-white); padding:26px 24px;}
  .control-detail .control-title{
    font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:0.86rem;
    color:var(--rc-forest-deep); margin-bottom:6px;
  }
  .control-detail .rainbow-bar{margin-bottom:18px;}
  .control-field{margin-bottom:14px;}
  .control-field .field-label{
    font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--rc-emerald); margin-bottom:3px;
  }
  .control-field .field-value{font-size:0.88rem; color:#3f4a43; line-height:1.5;}

  /* ---------- Leaders ---------- */
  .leaders{background:var(--panel-white);}
  .leader-grid{
    display:grid; grid-template-columns:repeat(4,1fr); gap:22px;
  }
  @media (max-width:900px){.leader-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:520px){.leader-grid{grid-template-columns:1fr;}}

  .leader-card{
    background:var(--page-bg);
    border-radius:6px;
    padding:26px 20px 22px;
    text-align:center;
    border:1px solid var(--rc-line);
  }
  .leader-avatar{
    width:68px; height:68px; border-radius:50%;
    margin:0 auto 16px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--rc-forest-deep), var(--rc-emerald));
    color:var(--rc-gold-soft);
    font-family:'Fraunces', serif; font-weight:600; font-size:1.15rem;
  }
  .leader-card h3{font-size:1.02rem; margin-bottom:4px;}
  .leader-card .role{font-size:0.82rem; color:#5a655e; margin-bottom:10px;}
  .leader-card .tag{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.64rem; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--rc-emerald);
    border:1px solid rgba(23,105,74,0.3);
    padding:3px 9px; border-radius:20px;
  }
  .leaders-note{
    margin-top:36px; font-size:0.84rem; color:#5a655e;
    border-top:1px dashed var(--rc-line); padding-top:18px;
  }

  /* ---------- Voices / feedback ---------- */
  .voices{background:var(--rc-forest-deep); color:var(--panel-white);}
  .voices-grid{
    display:grid; grid-template-columns:1fr 1.1fr; gap:56px; align-items:start;
  }
  @media (max-width:900px){.voices-grid{grid-template-columns:1fr; gap:44px;}}

  .voices .eyebrow{color:var(--rc-gold-soft);}
  .voices h2{color:var(--panel-white); font-size:clamp(1.6rem,3vw,2.2rem); margin:12px 0 18px;}
  .voices p.lede{color:rgba(255,255,255,0.75); line-height:1.65; max-width:44ch; margin-bottom:28px;}

  .voices ul.points{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:16px;}
  .voices ul.points li{
    display:flex; gap:12px; align-items:flex-start;
    font-size:0.94rem; color:rgba(255,255,255,0.82); line-height:1.5;
  }
  .voices ul.points li .dot{
    width:8px;height:8px;border-radius:50%;background:var(--rc-gold);
    margin-top:6px; flex-shrink:0;
  }

  form.share-form{
    background:var(--page-bg);
    color:var(--rc-ink);
    border-radius:6px;
    padding:30px;
    box-shadow:var(--shadow);
  }
  .type-toggle{display:flex; gap:8px; margin-bottom:20px;}
  .type-toggle button{
    flex:1;
    padding:10px 14px;
    border-radius:4px;
    border:1px solid var(--rc-line);
    background:var(--panel-white);
    font-family:'Work Sans', sans-serif;
    font-weight:600; font-size:0.86rem;
    color:var(--rc-forest);
    cursor:pointer;
    transition:background .18s ease, color .18s ease, border-color .18s ease;
  }
  .type-toggle button[aria-pressed="true"]{
    background:var(--rc-forest-deep); color:var(--panel-white); border-color:var(--rc-forest-deep);
  }

  .field{margin-bottom:16px;}
  .field label{
    display:block; font-size:0.82rem; font-weight:600;
    margin-bottom:6px; color:var(--rc-forest-deep);
  }
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:520px){.field-row{grid-template-columns:1fr;}}

  input[type="text"], input[type="email"], select, textarea{
    width:100%;
    padding:11px 13px;
    border:1px solid var(--rc-line);
    border-radius:4px;
    font-family:'Work Sans', sans-serif;
    font-size:0.94rem;
    background:var(--panel-white);
    color:var(--rc-ink);
  }
  textarea{resize:vertical; min-height:100px;}
  input:focus-visible, select:focus-visible, textarea:focus-visible, button:focus-visible, a:focus-visible{
    outline:2px solid var(--rc-gold); outline-offset:2px;
  }

  .submit-row{display:flex; align-items:center; gap:16px; margin-top:6px;}
  .submit-row .btn-primary{border:none; cursor:pointer;}
  .form-note{font-size:0.78rem; color:#5a655e;}

  .success-msg{
    display:none;
    margin-top:16px;
    padding:14px 16px;
    border-radius:4px;
    background:rgba(23,105,74,0.12);
    border:1px solid rgba(23,105,74,0.35);
    color:var(--rc-forest-deep);
    font-size:0.9rem;
  }
  .success-msg.show{display:block;}

  /* ---------- Footer ---------- */
  footer{
    background:var(--rc-forest-deep);
    border-top:1px solid rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.65);
    padding:32px 0;
    font-size:0.85rem;
  }
  .footer-inner{
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
  }
  footer a{color:var(--rc-gold-soft); text-decoration:none;}

  /* ---------- Control detail page ---------- */
  .breadcrumb{
    font-size:0.82rem; color:#5a655e; margin-bottom:22px; flex-wrap:wrap;
    display:flex; align-items:center; gap:0;
  }
  .breadcrumb a{color:var(--rc-emerald); text-decoration:none; font-weight:600;}
  .breadcrumb a:hover{text-decoration:underline;}
  .breadcrumb .sep{margin:0 6px; opacity:0.5;}
  .breadcrumb .current{color:var(--rc-forest-deep); font-weight:600;}

  .placeholder-flag{
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(200,155,60,0.14);
    border:1px solid rgba(200,155,60,0.4);
    color:#7a5a1a;
    font-size:0.82rem; font-weight:600;
    padding:8px 14px; border-radius:20px;
    margin-bottom:30px;
  }

  .control-header{margin-bottom:8px;}
  .control-header .control-no{
    font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:0.9rem;
    color:var(--rc-emerald); letter-spacing:0.04em;
  }
  .control-header h2{font-size:clamp(1.5rem,3vw,2rem); margin:8px 0 4px;}
  .control-header .meta-row{
    display:flex; gap:10px; flex-wrap:wrap; margin:14px 0 30px;
  }
  .control-header .meta-pill{
    font-size:0.76rem; font-weight:600;
    padding:5px 12px; border-radius:20px;
    background:var(--page-bg); color:var(--rc-forest-deep);
    border:1px solid var(--rc-line);
  }

  .control-body{
    display:grid; grid-template-columns:1fr; gap:0;
    border:1px solid var(--rc-line); border-radius:6px; overflow:hidden;
    box-shadow:var(--shadow); background:var(--panel-white);
  }
  .control-row{
    display:grid; grid-template-columns:220px 1fr;
    border-bottom:1px solid var(--rc-line);
  }
  .control-row:last-child{border-bottom:none;}
  @media (max-width:700px){.control-row{grid-template-columns:1fr;}}
  .control-row .row-label{
    background:var(--page-bg);
    padding:18px 20px;
    font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
    color:var(--rc-emerald);
  }
  .control-row .row-value{
    padding:18px 22px; font-size:0.94rem; color:#3f4a43; line-height:1.65;
  }

  .footnotes{margin-top:22px; font-size:0.8rem; color:#5a655e; line-height:1.6;}
  .footnotes li{margin-bottom:6px;}

  .control-nav{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:44px; padding-top:24px; border-top:1px dashed var(--rc-line);
    gap:16px; flex-wrap:wrap;
  }
  .control-nav a{
    font-size:0.86rem; font-weight:600; color:var(--rc-emerald); text-decoration:none;
  }
  .control-nav a:hover{text-decoration:underline;}
  .control-nav .nav-mid a{color:var(--rc-forest-deep);}

  .not-found{padding:60px 0; text-align:center;}
  .not-found h2{margin-bottom:12px;}
  .not-found p{color:#5a655e; margin-bottom:22px;}
</style>
</head>

<script src="pmf-data.js"></script>
<script>
  (function renderControl(){
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    var content = document.getElementById('controlContent');
    var breadcrumbCurrent = document.getElementById('breadcrumbCurrent');
    var control = id ? PMF_CONTROLS[id] : null;

    if(!control){
      breadcrumbCurrent.textContent = 'Control not found';
      content.innerHTML =
        '<div class="not-found">' +
          '<h2>Control not found</h2>' +
          '<p>We couldn\'t find a control matching "' + (id || '') + '". It may have been renamed or removed.</p>' +
          '<a href="pmf-standards.html" class="btn btn-primary">Back to Project Standards</a>' +
        '</div>';
      return;
    }

    document.title = 'Control: ' + id + ' ' + control.title + ' | PMF | Center of Excellence';
    breadcrumbCurrent.textContent = id + ' ' + control.title;

    var footnotesHtml = '';
    if(control.footnotes && control.footnotes.length){
      footnotesHtml = '<ul class="footnotes">' +
        control.footnotes.map(function(f){ return '<li>' + f + '</li>'; }).join('') +
        '</ul>';
    }

    content.innerHTML =
      '<div class="placeholder-flag">&#9888; Sample content — replace with Renaissance\'s real control text</div>' +
      '<div class="control-header">' +
        '<div class="control-no">CONTROL: ' + id + '</div>' +
        '<h2>' + control.title + '</h2>' +
        '<div class="rainbow-bar"></div>' +
        '<div class="meta-row">' +
          '<span class="meta-pill">Phase: ' + control.phase + '</span>' +
          '<span class="meta-pill">Accountability: ' + control.accountability + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="control-body">' +
        '<div class="control-row"><div class="row-label">Context</div><div class="row-value">' + control.context + '</div></div>' +
        '<div class="control-row"><div class="row-label">Activity</div><div class="row-value">' + control.activity + '</div></div>' +
        '<div class="control-row"><div class="row-label">Purpose</div><div class="row-value">' + control.purpose + '</div></div>' +
        '<div class="control-row"><div class="row-label">Requirements from other Standards</div><div class="row-value">' + control.requirements + '</div></div>' +
        '<div class="control-row"><div class="row-label">Evidence recorded in</div><div class="row-value">' + control.evidence + '</div></div>' +
        '<div class="control-row"><div class="row-label">Accountability</div><div class="row-value">' + control.accountability + '</div></div>' +
        '<div class="control-row"><div class="row-label">Phase</div><div class="row-value">' + control.phase + '</div></div>' +
      '</div>' +
      footnotesHtml;

    var ids = Object.keys(PMF_CONTROLS);
    var idx = ids.indexOf(id);
    var prevId = idx > 0 ? ids[idx - 1] : null;
    var nextId = idx < ids.length - 1 ? ids[idx + 1] : null;

    var navHtml = '<div class="control-nav">';
    navHtml += prevId
      ? '<a href="pmf-control.html?id=' + encodeURIComponent(prevId) + '">&larr; ' + prevId + ' ' + PMF_CONTROLS[prevId].title + '</a>'
      : '<span></span>';
    navHtml += '<div class="nav-mid"><a href="pmf-standards.html">All Project Standards</a></div>';
    navHtml += nextId
      ? '<a href="pmf-control.html?id=' + encodeURIComponent(nextId) + '">' + nextId + ' ' + PMF_CONTROLS[nextId].title + ' &rarr;</a>'
      : '<span></span>';
    navHtml += '</div>';

    content.insertAdjacentHTML('beforeend', navHtml);
  })();
</script>
